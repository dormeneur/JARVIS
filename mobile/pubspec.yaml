name: jarvis_mobile
description: JARVIS personal vault — offline-first mobile client.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.4
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  crypto: ^3.0.6
  path: ^1.9.1
  flutter_markdown: ^0.7.4
  file_picker: ^10.3.10
  flutter_pdfview: ^1.4.4
  docx_to_text: ^1.0.1
  url_launcher: ^6.3.2
  shared_preferences: ^2.5.5
  pointycastle: ^4.0.0
  uuid: ^4.5.3
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.5
  build_runner: ^2.4.14
  drift_dev: ^2.22.1
  path_provider_platform_interface: ^2.1.2
  plugin_platform_interface: ^2.1.8

flutter:
  uses-material-design: true
